<body>
<script>
  // Apply the stored / preferred theme before first paint to avoid a flash.
  (function () {
    try {
      var t = localStorage.getItem('nr_theme');
      if (t !== 'dark' && t !== 'light') {
        t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
